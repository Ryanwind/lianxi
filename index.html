<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <style> body { font-family: 'Roboto', 'Microsoft YaHei', sans-serif; background-color: #F8F9FA; } </style>
</head>
<body id="page-home">
    
    <div id="global-header"></div>

    <section class="relative bg-black h-[600px] flex items-center border-b-8 border-[#FDB813]">
        <div class="absolute inset-0 opacity-50">
            <img class="w-full h-full object-cover grayscale" src="https://images.unsplash.com/photo-1581092580497-e0d23cbdf1dc?auto=format&fit=crop&q=80&w=1920" alt="Heavy Machinery Undercarriage">
        </div>
        <div class="relative z-10 max-w-7xl mx-auto px-4 w-full">
            <div class="max-w-2xl">
                <div class="inline-block bg-[#0033A0] text-white px-3 py-1 text-sm font-bold uppercase tracking-widest mb-4">HEAVY DUTY UNDERCARRIAGE</div>
                <h1 class="text-5xl md:text-6xl font-black text-white mb-6 uppercase leading-none">驱动重型力量的<br><span class="text-[#FDB813]">钢铁脊梁</span></h1>
                <p class="text-xl text-gray-300 mb-8 border-l-4 border-[#FDB813] pl-4">为极限工况而生。专注于高强度履带底盘件制造与供应，适配小松、卡特、日立等全系重型挖掘机与推土机。</p>
                <div class="flex gap-4">
                    <a href="products.html" class="bg-[#FDB813] text-black font-black px-8 py-4 uppercase hover:bg-white transition">查看全系底盘件</a>
                    <a href="contact.html" class="border-2 border-white text-white font-black px-8 py-4 uppercase hover:bg-white hover:text-black transition">联系专家获取报价</a>
                </div>
            </div>
        </div>
    </section>

    <section class="py-16 bg-white">
        <div class="max-w-7xl mx-auto px-4 grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="text-center p-6 border border-gray-100 shadow-sm">
                <div class="text-5xl mb-4">🔩</div>
                <h3 class="text-xl font-bold text-[#0033A0] mb-2 uppercase">严苛热处理工艺</h3>
                <p class="text-gray-600">从销轴到齿圈，全线采用深层高频感应淬火，抗冲击与耐磨性超越行业标准。</p>
            </div>
            <div class="text-center p-6 border border-gray-100 shadow-sm">
                <div class="text-5xl mb-4">🚜</div>
                <h3 class="text-xl font-bold text-[#0033A0] mb-2 uppercase">100% 完美适配</h3>
                <p class="text-gray-600">海量 OEM 数据库支撑，确保从 20吨 到 90吨级 设备的无损安装替换。</p>
            </div>
            <div class="text-center p-6 border border-gray-100 shadow-sm">
                <div class="text-5xl mb-4">⏱️</div>
                <h3 class="text-xl font-bold text-[#0033A0] mb-2 uppercase">现货敏捷交付</h3>
                <p class="text-gray-600">大量标准底盘件常备库存，极大缩短设备停机等待时间，保障工程进度。</p>
            </div>
        </div>
    </section>

    <div id="global-footer"></div>

    <script src="data-control.js"></script>
</body>
</html>
